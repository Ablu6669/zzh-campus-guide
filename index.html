<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园新生指南 - 香港中文大学（深圳）</title>
<style>

/* ===================================
   设计系统 | Design System
   =================================== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
    /* 主色 | Primary */
    --color-primary: #667eea;
    --color-primary-dark: #764ba2;
    --color-primary-light: #f5f5ff;
    --color-primary-lighter: #e8e9ff;
    --color-primary-hover: #e0e3ff;

    /* 渐变 | Gradients */
    --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --gradient-page: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

    /* 文字色 | Text */
    --color-heading: #1a1a2e;
    --color-body: #333;
    --color-muted: #666;
    --color-light: #999;
    --color-faint: #888;

    /* 背景色 | Background */
    --color-bg: #ffffff;
    --color-bg-subtle: #f8f9fa;
    --color-bg-hover: #f0f2ff;

    /* 边框色 | Border */
    --color-border: #e8e8e8;
    --color-border-light: #f0f0f0;
    --color-border-hover: #c5d0f5;

    /* 阴影 | Shadows */
    --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.06);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.15);
    --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.3);
    --shadow-primary: 0 4px 20px rgba(102, 126, 234, 0.15);
    --shadow-primary-lg: 0 12px 36px rgba(102, 126, 234, 0.25);

    /* 圆角 | Radius */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 15px;
    --radius-xl: 20px;
    --radius-full: 999px;

    /* 过渡 | Transitions */
    --ease-fast: 0.2s ease;
    --ease-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --ease-smooth: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out: 0.3s cubic-bezier(0.16, 1, 0.3, 1);

    /* 间距 | Spacing */
    --space-xs: 8px;
    --space-sm: 12px;
    --space-md: 20px;
    --space-lg: 30px;
    --space-xl: 40px;
}

/* ===================================
   基础重置 | Reset
   =================================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: var(--gradient-page);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ===================================
   登录页 | Login
   =================================== */
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.login-box {
    background: var(--color-bg);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
    padding: 50px;
    max-width: 500px;
    width: 100%;
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
}

.logo {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
}

.login-header h1 {
    color: var(--color-heading);
    font-size: 32px;
    margin-bottom: 10px;
}

.subtitle {
    color: var(--color-muted);
    font-size: 16px;
}

.login-form h2 {
    color: var(--color-heading);
    font-size: 24px;
    margin-bottom: 20px;
    text-align: center;
}

.school-select {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 30px;
}

.school-option {
    border: 2px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 20px;
    cursor: pointer;
    transition: all var(--ease-base);
    display: flex;
    align-items: center;
    gap: 15px;
    position: relative;
}

.school-option:hover {
    border-color: var(--color-primary);
    background: var(--color-primary-light);
    box-shadow: var(--shadow-primary);
}

.school-option.selected {
    border-color: var(--color-primary);
    background: var(--color-primary-light);
}

.school-option.disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.school-option img {
    width: 60px;
    height: 60px;
    border-radius: var(--radius-sm);
    object-fit: cover;
}

.school-info {
    flex: 1;
}

.school-info h3 {
    color: var(--color-heading);
    font-size: 18px;
    margin-bottom: 5px;
}

.school-info p {
    color: var(--color-light);
    font-size: 14px;
}

.check-mark {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--color-primary);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 18px;
}

.school-option.selected .check-mark {
    display: flex;
}

.login-btn {
    width: 100%;
    padding: 15px;
    background: var(--gradient-primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 18px;
    cursor: pointer;
    transition: all var(--ease-base);
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-primary-lg);
}

.login-btn:active {
    transform: translateY(0);
}

.login-footer {
    text-align: center;
    margin-top: 30px;
    color: var(--color-light);
    font-size: 14px;
}

/* ===================================
   语言切换按钮 | Language Toggle
   =================================== */
.btn-lang {
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-full);
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--ease-fast);
    margin-right: 8px;
}
.lang-fixed {
    position: fixed;
    top: 15px; right: 15px;
    z-index: 9999;
}
.btn-lang:hover {
    background: var(--color-primary-dark);
    box-shadow: var(--shadow-primary);
}

/* ===================================
   页面通用头 | Page Header
   =================================== */
.main-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 25px 20px 40px;
}

.page-header {
    background: var(--color-bg);
    padding: 24px 30px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    margin-bottom: 22px;
    transition: box-shadow var(--ease-base);
}
.page-header h2 { font-size: 22px; color: var(--color-heading); }
.page-header p  { font-size: 14px; color: var(--color-faint); margin-top: 4px; }

.main-header {
    background: var(--color-bg);
    padding: 20px 30px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.school-badge {
    background: var(--gradient-primary);
    color: white;
    padding: 8px 15px;
    border-radius: var(--radius-full);
    font-size: 14px;
}

.header-right {
    display: flex;
    gap: 10px;
}

.btn-secondary {
    padding: 10px 20px;
    background: var(--color-bg-subtle);
    color: var(--color-body);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--ease-base);
}

.btn-secondary:hover {
    background: var(--color-primary-hover);
    color: var(--color-primary);
}

/* ===================================
   主页功能卡片 | Home Cards
   =================================== */
.main-content {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.card {
    background: var(--color-bg);
    border-radius: var(--radius-lg);
    padding: 30px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all var(--ease-out);
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--gradient-primary);
    opacity: 0;
    transition: opacity var(--ease-base);
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: var(--shadow-primary-lg);
    border-color: var(--color-border-hover);
}

.card:hover::before {
    opacity: 1;
}

.card:active {
    transform: translateY(-2px) scale(1.01);
}

.card-icon {
    width: 60px;
    height: 60px;
    background: var(--gradient-primary);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin-bottom: 20px;
    transition: transform var(--ease-smooth);
    box-shadow: var(--shadow-primary);
}

.card:hover .card-icon {
    transform: scale(1.1) rotate(-5deg);
}

.card h3 {
    color: var(--color-heading);
    font-size: 22px;
    margin-bottom: 10px;
}

.card p {
    color: var(--color-muted);
    font-size: 14px;
    line-height: 1.6;
}

/* ===================================
   子页面通用 | Sub-pages
   =================================== */
.page-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

.page-content {
    background: var(--color-bg);
    padding: 30px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 10px 20px;
    background: var(--color-bg-subtle);
    color: var(--color-body);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-bottom: 20px;
    transition: all var(--ease-base);
}

.back-btn:hover {
    background: var(--color-primary-hover);
    color: var(--color-primary);
}

/* ===================================
   联系方式卡片 | Contact Cards
   =================================== */
.contact-card {
    background: var(--color-bg-subtle);
    padding: 20px;
    border-radius: var(--radius-md);
    border-left: 4px solid var(--color-primary);
    transition: all var(--ease-out);
}

.contact-card:hover {
    background: var(--color-primary-lighter);
    transform: translateX(6px);
    box-shadow: var(--shadow-sm);
}

.contact-card h4 {
    color: var(--color-heading);
    font-size: 18px;
    margin-bottom: 5px;
}

.contact-card > p {
    color: var(--color-light);
    font-size: 14px;
    margin-bottom: 15px;
}

.contact-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.contact-info p {
    color: var(--color-muted);
    font-size: 14px;
    line-height: 1.6;
}

/* ===================================
   返回按钮增强 | Back Button Enhanced
   =================================== */
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 22px;
    background: var(--color-bg-subtle);
    color: var(--color-body);
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius-full);
    cursor: pointer;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 500;
    transition: all var(--ease-base);
    position: relative;
    overflow: hidden;
}

.back-btn:hover {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
    box-shadow: var(--shadow-primary);
    transform: translateX(-3px);
}

.back-btn:active {
    transform: translateX(-1px) scale(0.97);
}

/* ===================================
   页面切换动画 | Page Transition
   =================================== */
.page-container,
.main-container {
    animation: page-enter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes page-enter {
    from {
        opacity: 0;
        transform: translateY(12px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.page-content {
    animation: content-enter 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
}

@keyframes content-enter {
    from {
        opacity: 0;
        transform: translateY(16px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===================================
   滚动渐显 | Scroll Reveal
   =================================== */
.reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.reveal.reveal-visible {
    opacity: 1;
    transform: translateY(0);
}

.reveal:nth-child(2) { transition-delay: 0.06s; }
.reveal:nth-child(3) { transition-delay: 0.12s; }
.reveal:nth-child(4) { transition-delay: 0.18s; }
.reveal:nth-child(5) { transition-delay: 0.24s; }
.reveal:nth-child(6) { transition-delay: 0.30s; }

/* ===================================
   Toast 提示 | Toast Notification
   =================================== */
.toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.toast {
    background: var(--color-bg);
    color: var(--color-body);
    padding: 14px 24px;
    border-radius: var(--radius-full);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 420px;
    pointer-events: auto;
    animation: toast-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1px solid var(--color-border-light);
    line-height: 1.5;
}

.toast.toast-success {
    border-left: 4px solid #07c160;
}

.toast.toast-success .toast-icon {
    color: #07c160;
}

.toast.toast-info {
    border-left: 4px solid var(--color-primary);
}

.toast.toast-info .toast-icon {
    color: var(--color-primary);
}

.toast.toast-out {
    animation: toast-out 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes toast-in {
    from {
        opacity: 0;
        transform: translateY(-24px) scale(0.92);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes toast-out {
    to {
        opacity: 0;
        transform: translateY(-20px) scale(0.92);
    }
}

/* ===================================
   骨架屏 | Skeleton Loading
   =================================== */
.skeleton-box {
    background: linear-gradient(90deg,
        var(--color-bg-subtle) 25%,
        #e8e8ee 50%,
        var(--color-bg-subtle) 75%
    );
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.4s ease-in-out infinite;
    border-radius: var(--radius-md);
}

@keyframes skeleton-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.skeleton-map {
    width: 100%;
    height: 68vh;
    min-height: 400px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-light);
    font-size: 15px;
    gap: 8px;
}

.skeleton-map .skeleton-spinner {
    width: 22px;
    height: 22px;
    border: 3px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: skeleton-spin 0.7s linear infinite;
}

@keyframes skeleton-spin {
    to { transform: rotate(360deg); }
}

/* ===================================
   空状态 | Empty State
   =================================== */
.empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--color-light);
}

.empty-state .empty-icon {
    font-size: 52px;
    margin-bottom: 14px;
    opacity: 0.6;
    animation: empty-bounce 2s ease-in-out infinite;
}

@keyframes empty-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.empty-state .empty-title {
    font-size: 16px;
    color: var(--color-muted);
    margin-bottom: 6px;
    font-weight: 500;
}

.empty-state .empty-desc {
    font-size: 13px;
    color: var(--color-light);
}

/* ===================================
   卡片点击反馈 | Card Click Feedback
   =================================== */
.card,
.site-card,
.miniapp-card,
.abbr-card,
.phrase-card,
.contact-card,
.canteen-card,
.restaurant-card,
.store-card,
.loc-card {
    position: relative;
    overflow: hidden;
}

.card:active,
.site-card:active,
.miniapp-card:active,
.abbr-card:active,
.phrase-card:active,
.contact-card:active,
.canteen-card:active,
.restaurant-card:active,
.store-card:active,
.loc-card:active {
    transform: scale(0.98);
}

.ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(102, 126, 234, 0.25);
    pointer-events: none;
    transform: scale(0);
    animation: ripple-spread 0.5s ease-out;
}

@keyframes ripple-spread {
    to {
        transform: scale(2.5);
        opacity: 0;
    }
}

/* ===================================
   iPhone 安全区适配 | Safe Area
   =================================== */
.page-container {
    padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
}

/* ===================================
   响应式 | Responsive
   =================================== */
@media (max-width: 768px) {
    .login-box {
        padding: 30px 20px;
    }

    .login-header h1 {
        font-size: 24px;
    }

    .main-header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }

    .main-content {
        grid-template-columns: 1fr;
    }

    .toast {
        max-width: 90vw;
        font-size: 13px;
    }
}

/* ===================================
   工具类 | Utilities
   =================================== */
html:lang(en) .en-name { display: none; }

        .map-wrapper { width: 100%; overflow: hidden; border-radius: 12px; background: #f0f0f0; }
        .map-viewport {

        }

            position: absolute;

            margin-bottom: 3px;
        }
        .phrase-card .phrase-zh {
            font-size: 14px;
            color: var(--color-body);
            margin-bottom: 2px;
        }
        .phrase-card .phrase-note {
            font-size: 12px;
            color: var(--color-faint);
            line-height: 1.5;
            background: var(--color-bg-subtle);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            margin-top: 6px;
        }

        .search-wrapper { position: relative; max-width: 600px; margin: 0 auto; }
        .search-input {
            width: 100%; padding: 12px 44px 12px 18px;
            border: 2px solid var(--color-border); border-radius: 24px;
            font-size: 15px; outline: none; transition: border-color var(--ease-fast), box-shadow var(--ease-fast);
            background: var(--color-bg);
        }
        .search-input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 4px rgba(102,126,234,.12); }
        .search-clear {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 18px; color: var(--color-light);
            cursor: pointer; display: none; padding: 4px 8px;
        }
        .search-clear.show { display: block; }
        .search-dropdown {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--color-bg); border-radius: var(--radius-md); box-shadow: var(--shadow-md);
            margin-top: 6px; max-height: 400px; overflow-y: auto; z-index: 100;
            display: none;
        }
        .search-dropdown.show { display: block; }
        .search-item {
            padding: 12px 18px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
            border-bottom: 1px solid var(--color-border-light); transition: background var(--ease-fast);
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover, .search-item.active { background: var(--color-bg-hover); }
        .search-item-icon { font-size: 18px; flex-shrink: 0; font-weight: 700; color: var(--color-primary); min-width: 40px; }
        .search-item-body { flex: 1; min-width: 0; }
        .search-item-title { font-size: 14px; font-weight: 600; color: var(--color-heading); }
        .search-item-desc { font-size: 12px; color: var(--color-faint); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-highlight { color: var(--color-primary); font-weight: 700; }
        .search-no-result { padding: 40px 20px; text-align: center; color: var(--color-light); font-size: 14px; }
        .search-no-result .empty-icon { font-size: 44px; margin-bottom: 10px; opacity: 0.5; }
        .search-no-result .empty-title { font-size: 15px; color: var(--color-muted); margin-bottom: 4px; font-weight: 500; }
        .search-no-result .empty-desc { font-size: 12.5px; color: var(--color-light); }
        .section-title { margin-bottom: 16px; }
        .abbr-card.search-match, .phrase-card.search-match { animation: searchPop .3s ease; box-shadow: 0 0 0 3px rgba(102,126,234,.3); }
        @keyframes searchPop { 0%{transform:scale(.97);opacity:.5} 100%{transform:scale(1);opacity:1} }
    

</style>

<!-- ==================== 学校概况 ==================== -->
<div class="faq-group" data-cat="school">
<h3 data-i18n="faq_sec_school" style="color:#333;margin-bottom:15px;padding-bottom:10px;border-bottom:3px solid #667eea;">🏫 学校概况</h3>
<div style="display:flex;flex-direction:column;gap:10px;">

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_01_q" style="font-weight:bold;color:#333;cursor:pointer;">学校地址是什么？（快递、外卖地址如何填写？）</summary>
<p data-i18n="faq_school_01_a" style="color:#666;margin-top:10px;line-height:1.8;">
广东省深圳市龙岗区龙城街道龙翔大道2001号香港中文大学（深圳）xx门/xx书院。外卖只能送到各个门的外卖柜，快递可以送到每个书院快递柜（大件会放到上/下园快递中心）。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_02_q" style="font-weight:bold;color:#333;cursor:pointer;">如何从高铁站、机场、火车站等交通枢纽往返学校？</summary>
<p data-i18n="faq_school_02_a" style="color:#666;margin-top:10px;line-height:1.8;">
<strong>高铁站：</strong>深圳北站可选择公交E7路直达信息学院，或地铁5-14-16号线到达大运中心；深圳坪山站可乘地铁16号线直达；深圳站可乘地铁1-3号线抵达大运站；福田站可乘地铁11-14-16号线抵达大运中心，或公交E5路抵达信息学院。<br><br>
<strong>机场：</strong>深圳宝安国际机场有A4路机场快线直达（票价35元，约45-60分钟），地铁11-14-16号线约2小时（票价10元左右），打车约150-180元。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_03_q" style="font-weight:bold;color:#333;cursor:pointer;">学校周边交通情况如何？</summary>
<p data-i18n="faq_school_03_a" style="color:#666;margin-top:10px;line-height:1.8;">
学校大门分为：上园门（直通高速入口，无公交，主要打车出行）、下园老南门（出门有"信息学院"公交站）、下园新南门（步行约10分钟到达大运中心地铁站16号线）、下园东门（"港中大深圳校区"公交站）。校内还有"高峰专线407"路公交车可直达大运地铁站。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_04_q" style="font-weight:bold;color:#333;cursor:pointer;">学校构造如何？</summary>
<p data-i18n="faq_school_04_a" style="color:#666;margin-top:10px;line-height:1.8;">
学校分为上、中、下园三部分。<strong>下园</strong>主要是学生上课和课余活动场所，分布有教学楼、图书馆、科研楼、行政楼、操场、体育馆、超市、社康中心、快递中心等，逸夫书院是下园唯一书院。<strong>上园</strong>以书院（宿舍）为主，共有7个书院（学勤、思廷、祥波、道扬、厚含、第七书院、第八书院），也有7-11便利店、自习室、银行、社康、快递中心等。<strong>中园</strong>正在建设医学院和音乐学院，还有景色优美的神仙湖。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_05_q" style="font-weight:bold;color:#333;cursor:pointer;">学校教室是怎么分布的呢？</summary>
<p data-i18n="faq_school_05_a" style="color:#666;margin-top:10px;line-height:1.8;">
教室主要分布于学校东西走向中轴线一侧，有TA、TB、TC、TD四幢教学楼和TXA、TXB、TXC、TXD四栋教学综合大楼（Teaching Complex）。少部分课程也在道远楼、诚道楼、知新楼、志仁楼及行政楼开课，具体位置请查看【校园地图】。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_06_q" style="font-weight:bold;color:#333;cursor:pointer;">学校什么时候开学呢？</summary>
<p data-i18n="faq_school_06_a" style="color:#666;margin-top:10px;line-height:1.8;">
一般在8月底左右，具体报到安排收到录取通知书后，新生手册里会有详细说明。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_07_q" style="font-weight:bold;color:#333;cursor:pointer;">团员的团关系怎么转入港中深？</summary>
<p data-i18n="faq_school_07_a" style="color:#666;margin-top:10px;line-height:1.8;">
跟随录取通知书会有一本新生手册，里面会有详细内容。团关系转入香港中文大学（深圳）<strong>书院团支部</strong>。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_08_q" style="font-weight:bold;color:#333;cursor:pointer;">学校录取通知书会发银行卡，手机卡什么的吗？</summary>
<p data-i18n="faq_school_08_a" style="color:#666;margin-top:10px;line-height:1.8;">
银行卡是有的，中信银行。学校免费WiFi全覆盖，手机卡可以自己去营业厅办。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_school_09_q" style="font-weight:bold;color:#333;cursor:pointer;">快递费贵么？可以用快递100批量发货吗？</summary>
<p data-i18n="faq_school_09_a" style="color:#666;margin-top:10px;line-height:1.8;">
正常价格，与市面差别不大。学校有快递服务中心，丰巢也可以寄快递。具体价格视快递公司而定。
</p>
</details>

</div>
</div>

<!-- ==================== 学习相关 ==================== -->
<div class="faq-group" data-cat="study">
<h3 data-i18n="faq_sec_study" style="color:#333;margin-bottom:15px;padding-bottom:10px;border-bottom:3px solid #667eea;">📖 学习相关</h3>
<div style="display:flex;flex-direction:column;gap:10px;">

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_01_q" style="font-weight:bold;color:#333;cursor:pointer;">体育课有哪些？是自由选择的吗？</summary>
<p data-i18n="faq_study_01_a" style="color:#666;margin-top:10px;line-height:1.8;">
体育课可选种类非常丰富，除了常见的篮球、足球、羽毛球、乒乓球外，还有瑜伽、散打、高尔夫、攀岩、地壶、飞盘等项目。体育课可自由选择，但热门课程需要抢课。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_02_q" style="font-weight:bold;color:#333;cursor:pointer;">全英文教学我能适应吗？</summary>
<p data-i18n="faq_study_02_a" style="color:#666;margin-top:10px;line-height:1.8;">
建议大家上课前浏览老师在Blackboard（简称BB）上上传的课程内容，做好预习，查一下专有名词的解释。教授们对大一新生会讲得慢一些，足够让大家适应。下课后如有疑惑一定要大胆询问老师（也可以在老师的Office Hour约时间答疑）。如果是中国老师可以用中文提问，外国老师则需英语交流，但这也是练习口语和听力的好机会。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_03_q" style="font-weight:bold;color:#333;cursor:pointer;">什么时候选专业呢？</summary>
<p data-i18n="faq_study_03_a" style="color:#666;margin-top:10px;line-height:1.8;">
理科实验班的同学，在开学前会让大家选定学院。所有同学会在大一下学期（5月份左右）在学院内选专业。选专业前会有各类讲座为大家答疑解惑，可根据自己的情况酌情选择。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_04_q" style="font-weight:bold;color:#333;cursor:pointer;">如何迅速适应学校的学习生活？</summary>
<p data-i18n="faq_study_04_a" style="color:#666;margin-top:10px;line-height:1.8;">
不要抱着"大学就是放松"的想法开始大学生活。在港中深没有班级的概念，需要自己做学习上的主人，主动安排学习任务，多与同学、教授和学长学姐交流。<strong>时刻关注自己的学校邮箱！</strong>每个人都会被分配一个edu邮箱，这是大学四年里所有课程信息、学校通知、活动通知的阵地，一定要养成勤看邮件的习惯！
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_05_q" style="font-weight:bold;color:#333;cursor:pointer;">需不需要买纸质课本呢？</summary>
<p data-i18n="faq_study_05_a" style="color:#666;margin-top:10px;line-height:1.8;">
电子版和纸质版完全依个人需求而定，正常情况电子书已能满足大部分应用。如果不适应用电子书可以买纸质书，但部分课程会因老师更换而改变教材，买二手教材时要慎重。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_06_q" style="font-weight:bold;color:#333;cursor:pointer;">选课应该怎么选呢？</summary>
<p data-i18n="faq_study_06_a" style="color:#666;margin-top:10px;line-height:1.8;">
大一第一学期的课程学校基本给大家安排好了：理工、数据科学、人文和医学院只需抢体育、语文/思政；经管学院抢体育、语文/思政和数学课（MAT1001或MAT1005，其中1001更难，1005较简单，但仅未来想选会计或市场营销专业的同学学1005，其他专业建议学1001）。对数学有信心的同学都可以申请MAT1011，比1001更难，但对数学专业同学有帮助且给分更好。入学时会有老师和学长学姐教大家操作选课系统。各专业的课程要求可参考<a href="https://registry.cuhk.edu.cn/" target="_blank" style="color:#667eea;">教务处官网</a>。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_07_q" style="font-weight:bold;color:#333;cursor:pointer;">体育课是怎么打分的呢？要算入GPA吗？</summary>
<p data-i18n="faq_study_07_a" style="color:#666;margin-top:10px;line-height:1.8;">
体育课分为笔试、技术考试和体测，体测成绩仅占5%，主要以笔试和技术考试为主。技术考试即考所选体育课的内容，老师有自己的打分标准（建议选自己擅长的项目）。体育成绩算入GPA，但仅1学分，加权平均后对总GPA的影响不是特别大。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_08_q" style="font-weight:bold;color:#333;cursor:pointer;">如何评价金融工程专业？</summary>
<p data-i18n="faq_study_08_a" style="color:#666;margin-top:10px;line-height:1.8;">
金融工程专业是一门交叉学科，是目前比较前沿、比较火的方向之一，结合了金融、数学和计算机的知识。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_09_q" style="font-weight:bold;color:#333;cursor:pointer;">大一想跟教授做课题，是直接发邮件问吗？有什么建议？</summary>
<p data-i18n="faq_study_09_a" style="color:#666;margin-top:10px;line-height:1.8;">
有些教授会通过多方渠道招募RA（Research Assistant），可以通过这个渠道跟项目组产生联系。如果有感兴趣的领域，可以大胆给教授发邮件表达加入意向，机会都是争取来的。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_study_10_q" style="font-weight:bold;color:#333;cursor:pointer;">学校的暑课项目平均收费多少？需要雅思或托福成绩吗？</summary>
<p data-i18n="faq_study_10_a" style="color:#666;margin-top:10px;line-height:1.8;">
本校上暑课前6学分不收费，如果暑课交换到其他校区则会收费，具体视项目要求而定。
</p>
</details>

</div>
</div>

<!-- ==================== 生活相关 ==================== -->
<div class="faq-group" data-cat="life">
<h3 data-i18n="faq_sec_life" style="color:#333;margin-bottom:15px;padding-bottom:10px;border-bottom:3px solid #667eea;">🏠 生活相关</h3>
<div style="display:flex;flex-direction:column;gap:10px;">

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_life_01_q" style="font-weight:bold;color:#333;cursor:pointer;">书院是随机分的吗？可以自选宿舍吗？可以换宿舍吗？</summary>
<p data-i18n="faq_life_01_a" style="color:#666;margin-top:10px;line-height:1.8;">
书院和宿舍都是随机分配的，如无特殊情况，可以在一学年结束时提出换宿舍申请。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_life_02_q" style="font-weight:bold;color:#333;cursor:pointer;">床的长宽是多少？</summary>
<p data-i18n="faq_life_02_a" style="color:#666;margin-top:10px;line-height:1.8;">
不同书院有差别，床垫的话书院也会提供（二手但清洁）的床垫，具体可以等分好宿舍和书院后再做安排。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_life_03_q" style="font-weight:bold;color:#333;cursor:pointer;">学校有多少个食堂，味道如何？价格如何？</summary>
<p data-i18n="faq_life_03_a" style="color:#666;margin-top:10px;line-height:1.8;">
学校下园有4个食堂：学生活动中心一楼、二楼、逸夫书院的逸帆风顺、会议楼餐厅；上园在祥波书院、思廷书院、学勤书院、厚含书院也有食堂。学勤书院食堂里有麦当劳和乐凯撒。思廷书院有烧腊、云吞等正餐以及夜宵（到晚上11:30，有时12点后也有）。详见【校园地图】和【常用设施及服务】。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_life_04_q" style="font-weight:bold;color:#333;cursor:pointer;">宿舍和舍友是自己选的吗？</summary>
<p data-i18n="faq_life_04_a" style="color:#666;margin-top:10px;line-height:1.8;">
宿舍是随机分配的。但开学前会让大家填写作息规律和空调敏感度等问卷，按照大家相似的生活习惯进行分配。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_life_05_q" style="font-weight:bold;color:#333;cursor:pointer;">学校里有打印店吗（最好可以彩印的）？</summary>
<p data-i18n="faq_life_05_a" style="color:#666;margin-top:10px;line-height:1.8;">
学校里随处可见自助打印机（具体使用方法可以咨询学长学姐或ITSO），可以黑白也可以彩色打印，黑白0.1元/页，彩色0.85元/页。同时学校下园也有打印店可以打印或制作海报等。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_life_06_q" style="font-weight:bold;color:#333;cursor:pointer;">学校外卖、快递相关问题？</summary>
<p data-i18n="faq_life_06_a" style="color:#666;margin-top:10px;line-height:1.8;">
<strong>外卖：</strong>学校周围外卖种类繁多，可以送到下园老南门/新南门，上园北门/祥波门，有智能外卖柜，扫码输入手机号后四位取餐。也可以加入各种外卖凑单群，午餐晚餐时间会有一些店家统一为学校配送。<br><br>
<strong>快递：</strong>学校上园和下园均有大量丰巢快递柜以及收发室（顺丰速运负责运营）。小件快递会被放入丰巢，大件会被送到收发室保管。学校的丰巢无论存柜多久均无任何存柜费，免费使用。同时丰巢和收发室也有寄件功能，顺丰快递还可以上门取件。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_life_07_q" style="font-weight:bold;color:#333;cursor:pointer;">宿舍可以养（进）猫猫吗？有军训吗？有体测吗？</summary>
<p data-i18n="faq_life_07_a" style="color:#666;margin-top:10px;line-height:1.8;">
宿舍不可以养宠物！不过如果喜欢撸猫的话上园有很多只猫，每一只都有自己的名字，可以关注港中深动物保护协会了解学校里的猫猫们！<br><br>
按照以往经验，<strong>无军训，有体测</strong>。体测大概在10-11月份，标准遵循教育部制定的大学生体测标准。
</p>
</details>

</div>
</div>

<!-- ==================== 娱乐相关 ==================== -->
<div class="faq-group" data-cat="fun">
<h3 data-i18n="faq_sec_fun" style="color:#333;margin-bottom:15px;padding-bottom:10px;border-bottom:3px solid #667eea;">🎯 娱乐相关</h3>
<div style="display:flex;flex-direction:column;gap:10px;">

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_fun_01_q" style="font-weight:bold;color:#333;cursor:pointer;">学校附近有什么商场或休闲娱乐场所？</summary>
<p data-i18n="faq_fun_01_a" style="color:#666;margin-top:10px;line-height:1.8;">
离学校最近的商场是大运天地，稍远一点还有龙岗星河COCO Park，COCO Park里有海底捞等各类饭店，有电影院，还有山姆会员超市。同时学校周围还有万科广场、万科里等，基本可满足日常逛街、外出吃饭、看电影等需求。学校附近还有大运自然公园等休闲娱乐场所。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_fun_02_q" style="font-weight:bold;color:#333;cursor:pointer;">校乐团非音乐学院学生可以参加吗？要怎样考核呢？</summary>
<p data-i18n="faq_fun_02_a" style="color:#666;margin-top:10px;line-height:1.8;">
学校艺术团体分为三大团：校合唱团、管弦乐团和民乐团。全校全体师生都可以通过报名→考核的流程加入艺术团体。<br><br>
<strong>合唱团</strong>的考核包括：清唱自选歌曲片段 + 现场视唱（可自选五线谱/简谱）+ 音域测试。通过考核的成员会收到邮件通知并告知所在声部（女高/女低/男高/男低）。合唱团每周排练两次，会参加学校年度音乐会演出以及合唱团专场演出。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_fun_03_q" style="font-weight:bold;color:#333;cursor:pointer;">社团管理层或是学生会干部在日后国外offer申请时有帮助吗？</summary>
<p data-i18n="faq_fun_03_a" style="color:#666;margin-top:10px;line-height:1.8;">
申请是一件很综合的事，可以说你在学校做的所有事都可能对申请有影响。除了目标学校官网公布的申请条件，没有什么是一定必要或不必要的。经历丰富一点可能会让审核人员看到你的多元化和发展潜力。
</p>
</details>

<details style="padding:15px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;">
<summary data-i18n="faq_fun_04_q" style="font-weight:bold;color:#333;cursor:pointer;">新生舞会是必须参加吗？</summary>
<p data-i18n="faq_fun_04_a" style="color:#666;margin-top:10px;line-height:1.8;">
不是，完全自愿！新生舞会是学校传统的迎新活动之一，可以认识新朋友、体验社交舞，有兴趣的同学可以参加。
</p>
</details>

</div>
</div>

        'faq_school_01_q': { zh: '学校地址是什么？（快递、外卖地址如何填写？）', en: 'What is the school address? (How to fill delivery/takeout address?)' },
        'faq_school_01_a': { zh: '广东省深圳市龙岗区龙城街道龙翔大道2001号香港中文大学（深圳）xx门/xx书院。外卖只能送到各个门的外卖柜，快递可以送到每个书院快递柜（大件会放到上/下园快递中心）。', en: 'No. 2001 Longxiang Avenue, Longcheng Street, Longgang District, Shenzhen, Guangdong, China Hong Kong University of Shenzhen (XX Gate/XX College). Takeout can only be delivered to takeout cabinets at each gate. Express delivery can be sent to each college\'s express locker (large items will be placed at the Upper/Lower Campus express center).' },
        'faq_school_02_q': { zh: '如何从高铁站、机场、火车站等交通枢纽往返学校？', en: 'How to get to/from the school from rail stations, airports, and train stations?' },
        'faq_school_02_a': { zh: '高铁站：深圳北站可选公交E7路直达信息学院，或地铁5-14-16号线到达大运中心；深圳坪山站可乘地铁16号线直达；深圳站可乘地铁1-3号线抵达大运站；福田站可乘地铁11-14-16号线抵达大运中心，或公交E5路抵达信息学院。机场：深圳宝安国际机场有A4路机场快线直达（票价35元，约45-60分钟），地铁11-14-16号线约2小时（票价10元左右），打车约150-180元。', en: 'High-speed rail: From Shenzhen North Station, take Bus E7 to Info Institute, or Metro Line 5-14-16 to Dayun Center. From Pingshan Station, take Metro Line 16 directly. From Shenzhen Station, take Metro Line 1-3 to Dayun Station. From Futian Station, take Metro Line 11-14-16 to Dayun Center, or Bus E5 to Info Institute. Airport: Airport Express A4 goes directly (35 RMB, ~45-60 min). Metro Line 11-14-16 takes ~2 hours (~10 RMB). Taxi ~150-180 RMB.' },
        'faq_school_03_q': { zh: '学校周边交通情况如何？', en: 'What is the transportation situation around the school?' },
        'faq_school_03_a': { zh: '学校大门分为：上园门（直通高速入口，无公交，主要打车出行）、下园老南门（出门有"信息学院"公交站）、下园新南门（步行约10分钟到达大运中心地铁站16号线）、下园东门（"港中大深圳校区"公交站）。校内还有"高峰专线407"路公交车可直达大运地铁站。', en: 'School gates: Upper Campus Gate (direct highway access, no bus, mainly taxi). Lower Campus Old South Gate (has "Info Institute" bus stop). Lower Campus New South Gate (~10 min walk to Dayun Center Metro Station Line 16). Lower Campus East Gate ("CUHK-Shenzhen Campus" bus stop). There is also Peak Route 407 bus within the school that goes directly to Dayun Metro Station.' },
        'faq_school_04_q': { zh: '学校构造如何？', en: 'What is the layout of the school campus?' },
        'faq_school_04_a': { zh: '学校分为上、中、下园三部分。下园主要是学生上课和课余活动场所，分布有教学楼、图书馆、科研楼、行政楼、操场、体育馆、超市、社康中心、快递中心等，逸夫书院是下园唯一书院。上园以书院（宿舍）为主，共有7个书院，也有7-11便利店、自习室、银行、社康、快递中心等。中园正在建设医学院和音乐学院，还有景色优美的神仙湖。', en: 'The school has three parts: Upper, Middle, and Lower Campus. Lower Campus is mainly for classes and activities, with teaching buildings, library, research buildings, admin building, sports field, gym, supermarket, clinic, delivery center, etc. Sir Run Run Shaw College is the only college in Lower Campus. Upper Campus is mainly colleges (dormitories) with 7 colleges, 7-11, study rooms, bank, clinic, delivery center, etc. Middle Campus is under construction for the Medical School and Music School, and has the beautiful Fairy Lake.' },
        'faq_school_05_q': { zh: '学校教室是怎么分布的呢？', en: 'How are the classrooms distributed on campus?' },
        'faq_school_05_a': { zh: '教室主要分布于学校东西走向中轴线的一侧，有TA、TB、TC、TD四幢教学楼和TXA、TXB、TXC、TXD四栋教学综合大楼（Teaching Complex）。少部分课程也在道远楼、诚道楼、知新楼、志仁楼及行政楼开课，具体位置请看【校园地图】。', en: 'Classrooms are mainly distributed along the east-west central axis of the campus, including four teaching buildings TA, TB, TC, TD and four teaching complex buildings TXA, TXB, TXC, TXD. A small number of courses are also held in Daoyuan Building, Chengdao Building, Zhixin Building, Zhiren Building and the Admin Building. Please refer to the [Campus Map] for specific locations.' },
        'faq_school_06_q': { zh: '学校什么时候开学呢？', en: 'When does the school start in the fall?' },
        'faq_school_06_a': { zh: '一般在8月底左右，具体报到安排收到录取通知书后，新生手册里会有详细说明。', en: 'Generally around late August. Specific registration arrangements will be detailed in the freshman handbook that comes with the admission letter.' },
        'faq_school_07_q': { zh: '团员的团关系怎么转入港中深？', en: 'How do League members transfer their League relationship to CUHK-Shenzhen?' },
        'faq_school_07_a': { zh: '跟随录取通知书会有一本新生手册，里面会有详细内容。团关系转入香港中文大学（深圳）书院团支部。', en: 'The freshman handbook that comes with the admission letter contains detailed information. The League relationship is transferred to the College Youth League Branch of CUHK-Shenzhen.' },
        'faq_school_08_q': { zh: '学校录取通知书会发银行卡，手机卡什么的吗？', en: 'Does the admission letter include bank cards, phone cards, etc.?' },
        'faq_school_08_a': { zh: '银行卡是有的，中信银行。学校免费WiFi全覆盖，手机卡可以自己去营业厅办。', en: 'A bank card is included (China CITIC Bank). The school has full free WiFi coverage. You can get a phone card at service halls yourself.' },
        'faq_school_09_q': { zh: '快递费贵么？可以用快递100批量发货吗？', en: 'Is delivery expensive? Can I use Kuaidi100 for batch shipping?' },
        'faq_school_09_a': { zh: '正常价格，与市面差别不大。学校有快递服务中心，丰巢也可以寄快递，具体价格视快递公司而定。', en: 'Normal prices, not much different from the market. The school has a delivery service center, and SF Express lockers can also send packages. Specific prices depend on the courier company.' },
        'faq_study_01_q': { zh: '体育课有哪些？是自由选择的吗？', en: 'What PE courses are available? Are they free to choose?' },
        'faq_study_01_a': { zh: '体育课可选种类非常丰富，除了常见的篮球、足球、羽毛球、乒乓球外，还有瑜伽、散打、高尔夫、攀岩、地壶、飞盘等项目。体育课可自由选择，但热门课程需要抢课。', en: 'PE courses are very diverse, including basketball, football, badminton, table tennis, as well as yoga, sanda, golf, rock climbing, floor curling, frisbee, etc. You can freely choose, but popular courses require course selection (snatching).' },
        'faq_study_02_q': { zh: '全英文教学我能适应吗？', en: 'Can I adapt to all-English teaching?' },
        'faq_study_02_a': { zh: '建议大家上课前浏览老师在Blackboard（简称BB）上上传的课程内容，做好预习，查一下专有名词的解释。教授们对大一新生会讲得慢一些，足够让大家适应。下课后如有疑惑一定要大胆询问老师（也可以在老师的Office Hour约时间答疑）。如果是中国老师可以用中文提问，外国老师则需英语交流，但这也是练习口语和听力的好机会。', en: 'It is recommended to browse the course content uploaded by teachers on Blackboard (BB) before class, preview well, and look up explanations of technical terms. Professors will speak slower for freshmen, which is enough for everyone to adapt. If you have doubts after class, be bold and ask the teacher (you can also make an appointment during the teacher\'s Office Hour). If it is a Chinese teacher, you can ask in Chinese; if it is a foreign teacher, you need to communicate in English, but this is also a good opportunity to practice speaking and listening.' },
        'faq_study_03_q': { zh: '什么时候选专业呢？', en: 'When do we choose our major?' },
        'faq_study_03_a': { zh: '理科实验班的同学，在开学前会让大家选定学院。所有同学会在大一下学期（5月份左右）在学院内选专业。选专业前会有各类讲座为大家答疑解惑，可根据自己的情况酌情选择。', en: 'For students in the Science Experimental Class, everyone will select their school before the start of the semester. All students will choose their major within their school in the second semester of freshman year (around May). Before major selection, there will be various lectures to answer questions, and you can choose according to your own situation.' },
        'faq_study_04_q': { zh: '如何迅速适应学校的学习生活？', en: 'How to quickly adapt to the school\'s learning and living?' },
        'faq_study_04_a': { zh: '不要抱着"大学就是放松"的想法开始大学生活。在港中深没有班级的概念，需要自己做学习上的主人，主动安排学习任务，多与同学、教授和学长学姐交流。时刻关注自己的学校邮箱！每个人都会被分配一个edu邮箱，这是大学四年里所有课程信息、学校通知、活动通知的阵地，一定要养成勤看邮件的习惯！', en: 'Don\'t start your college life with the idea that "college is for relaxing." At CUHK-Shenzhen, there is no concept of classes, so you need to be the master of your own learning, actively arrange learning tasks, and communicate more with classmates, professors, and seniors. Always pay attention to your school email! Everyone is assigned an edu email, which is the platform for all course information, school notices, and activity notices during your four years of college. You must develop the habit of checking emails frequently!' },
        'faq_study_05_q': { zh: '需不需要买纸质课本呢？', en: 'Do I need to buy physical textbooks?' },
        'faq_study_05_a': { zh: '电子版和纸质版完全依个人需求而定，正常情况电子书已能满足大部分应用。如果不适应用电子书可以买纸质书，但部分课程会因老师更换而改变教材，买二手教材时要慎重。', en: 'Electronic versions and physical versions are completely up to personal needs. Under normal circumstances, e-books can already meet most needs. If you don\'t adapt well to e-books, you can buy physical books, but some courses may change textbooks due to teacher changes, so be cautious when buying second-hand textbooks.' },
        'faq_study_06_q': { zh: '选课应该怎么选呢？', en: 'How should I select courses?' },
        'faq_study_06_a': { zh: '大一第一学期的课程学校基本给大家安排好了：理工、数据科学、人文和医学院只需抢体育、语文/思政；经管学院抢体育、语文/思政和数学课（MAT1001或MAT1005，其中1001更难，1005较简单，但仅未来想选会计或市场营销专业的同学学1005，其他专业建议学1001）。对数学有信心的同学都可以申请MAT1011，比1001更难，但对数学专业同学有帮助且给分更好。入学时会有老师和学长学姐教大家操作选课系统。各专业的课程要求可参考教务处官网。', en: 'The school basically arranges courses for everyone in the first semester of freshman year: Science, Data Science, Humanities and Medical schools only need to snatch PE, Chinese/Political courses; Economics and Management school snatches PE, Chinese/Political and Math courses (MAT1001 or MAT1005, with 1001 harder and 1005 easier, but only students who want to choose accounting or marketing in the future take 1005; other majors are advised to take 1001). Students confident in math can apply for MAT1011, which is harder than 1001 but helpful for math majors and has better grading. During enrollment, teachers and seniors will teach everyone how to operate the course selection system. Course requirements for each major can be found on the Registry website.' },
        'faq_study_07_q': { zh: '体育课是怎么打分的呢？要算入GPA吗？', en: 'How are PE courses graded? Do they count towards GPA?' },
        'faq_study_07_a': { zh: '体育课分为笔试、技术考试和体测，体测成绩仅占5%，主要以笔试和技术考试为主。技术考试即考所选体育课的内容。老师有自己的打分标准（建议选自己擅长的项目）。体育成绩算入GPA，但仅1学分，加权平均后对总GPA的影响不是特别大。', en: 'PE courses are divided into written exams, technical exams, and physical tests. The physical test score only accounts for 5%, mainly based on written and technical exams. The technical exam tests the content of the selected PE course. Teachers have their own grading standards (it is recommended to choose projects you excel at). PE scores count towards GPA, but only 1 credit, so the impact on overall GPA after weighted averaging is not particularly large.' },
        'faq_study_08_q': { zh: '如何评价金融工程专业？', en: 'How to evaluate the Financial Engineering major?' },
        'faq_study_08_a': { zh: '金融工程专业是一门交叉学科，是目前比较前沿、比较火的方向之一，结合了金融、数学和计算机的知识。', en: 'Financial Engineering is an interdisciplinary major, currently one of the more cutting-edge and popular directions, combining knowledge of finance, mathematics, and computer science.' },
        'faq_study_09_q': { zh: '大一想跟教授做课题，是直接发邮件问吗？有什么建议？', en: 'I want to do research with a professor in my freshman year. Should I just email them directly? Any advice?' },
        'faq_study_09_a': { zh: '有些教授会通过多方渠道招募RA（Research Assistant），可以通过这个渠道跟项目组产生联系。如果有感兴趣的领域，可以大胆给教授发邮件表达加入意向，机会都是争取来的。', en: 'Some professors recruit RAs (Research Assistants) through various channels. You can connect with research groups through this channel. If you have an interested field, you can boldly email the professor to express your intention to join. Opportunities are all fought for.' },
        'faq_study_10_q': { zh: '学校的暑课项目平均收费多少？需要雅思或托福成绩吗？', en: 'How much does the school\'s summer course program cost on average? Do I need IELTS or TOEFL scores?' },
        'faq_study_10_a': { zh: '本校上暑课前6学分不收费，如果暑课交换到其他校区则会收费，具体视项目要求而定。', en: 'The first 6 credits of summer courses at this school are free. If you exchange to other campuses for summer courses, there will be a charge, depending on the specific program requirements.' },
        'faq_life_01_q': { zh: '书院是随机分的吗？可以自选宿舍吗？可以换宿舍吗？', en: 'Are colleges randomly assigned? Can I choose my own dorm? Can I change dorms?' },
        'faq_life_01_a': { zh: '书院和宿舍都是随机分配的，如无特殊情况，可以在一学年结束时提出换宿舍申请。', en: 'Colleges and dorms are randomly assigned. Unless there are special circumstances, you can apply to change dorms at the end of an academic year.' },
        'faq_life_02_q': { zh: '床的长宽是多少？', en: 'What are the dimensions of the bed?' },
        'faq_life_02_a': { zh: '不同书院有差别，床垫的话书院也会提供（二手但清洁）的床垫，具体可以等分好宿舍和书院后再做安排。', en: 'Dimensions vary by college. The college can also provide (second-hand but clean) mattresses. Specific arrangements can be made after dorm and college assignments are completed.' },
        'faq_life_03_q': { zh: '学校有多少个食堂，味道如何？价格如何？', en: 'How many canteens are there at the school? How is the taste and price?' },
        'faq_life_03_a': { zh: '学校下园有4个食堂：学生活动中心一楼、二楼、逸夫书院的逸帆风顺、会议楼餐厅；上园在祥波书院、思廷书院、学勤书院、厚含书院也有食堂。学勤书院食堂里有麦当劳和乐凯撒。思廷书院有烧腊、云吞等正餐以及夜宵（到晚上11:30，有时12点后也有）。详见【校园地图】和【常用设施及服务】。', en: 'There are 4 canteens in Lower Campus: Student Activity Center 1F, 2F, Sir Run Run Shaw College\'s Yifan Fengshun, and Conference Building Restaurant. Upper Campus also has canteens in Harmonia College, SPC, Diligence College, and Houhan College. Diligence College canteen has McDonald\'s and Lekaisa. SPC has barbecue pork rice, wonton and other meals as well as late-night snacks (until 11:30 PM, sometimes after 12:00 AM). See [Campus Map] and [Facilities & Services].' },
        'faq_life_04_q': { zh: '宿舍和舍友是自己选的吗？', en: 'Do I choose my own dorm and roommates?' },
        'faq_life_04_a': { zh: '宿舍是随机分配的。但开学前会让大家填写作息规律和空调敏感度等问卷，按照大家相似的生活习惯进行分配。', en: 'Dorms are randomly assigned. But before the start of the semester, everyone will fill out questionnaires about daily routines and air conditioning sensitivity, and assignments are made according to similar living habits.' },
        'faq_life_05_q': { zh: '学校里有打印店吗（最好可以彩印的）？', en: 'Are there printing shops in the school (preferably with color printing)?' },
        'faq_life_05_a': { zh: '学校里随处可见自助打印机（具体使用方法可以咨询学长学姐或ITSO），可以黑白也可以彩色打印，黑白0.1元/页，彩色0.85元/页。同时学校下园也有打印店可以打印或制作海报等。', en: 'Self-service printers can be found everywhere in the school (consult seniors or ITSO for specific usage). Black-and-white printing is 0.1 RMB/page, color printing is 0.85 RMB/page. There are also printing shops in the Lower Campus for printing or poster making.' },
        'faq_life_06_q': { zh: '学校外卖、快递相关问题？', en: 'Questions about takeout and delivery at school?' },
        'faq_life_06_a': { zh: '外卖：学校周围外卖种类繁多，可以送到下园老南门/新南门，上园北门/祥波门，有智能外卖柜，扫码输入手机号后四位取餐。也可以加入各种外卖凑单群，午餐晚餐时间会有一些店家统一为学校配送。快递：学校上园和下园均有大量丰巢快递柜以及收发室（顺丰速运负责运营）。小件快递会被放入丰巢，大件会被送到收发室保管。学校的丰巢无论存柜多久均无任何存柜费，免费使用。同时丰巢和收发室也有寄件功能，顺丰快递还可以上门取件。', en: 'Takeout: Various types of takeout are available around the school, which can be delivered to Lower Campus Old South Gate/New South Gate, Upper Campus North Gate/Xiangbo Gate. There are smart takeout cabinets where you scan the code and enter the last 4 digits of your phone number to pick up. You can also join various takeout group orders. Delivery: Both Upper and Lower Campus have many SF Express lockers and delivery rooms (operated by SF Express). Small packages will be placed in SF lockers, large packages will be sent to the delivery room for safekeeping. The school\'s SF lockers have no storage fees regardless of duration, free to use. SF lockers and delivery rooms also have sending functions, and SF Express can also pick up packages from your door.' },
        'faq_life_07_q': { zh: '宿舍可以养（进）猫猫吗？有军训吗？有体测吗？', en: 'Can I keep (or bring) cats in the dorm? Is there military training? Is there a physical fitness test?' },
        'faq_life_07_a': { zh: '宿舍不可以养宠物！不过如果喜欢猫的话上园有很多只猫，每一只都有自己的名字，可以关注港中深动物保护协会了解学校里的猫猫们！按照以往经验，无军训，有体测。体测大概在10-11月份，标准遵循教育部制定的大学生体测标准。', en: 'Pets are not allowed in the dorms! But if you like cats, there are many cats in the Upper Campus, each with its own name. You can follow the CUHK-Shenzhen Animal Protection Association to learn about the cats on campus! According to past experience, there is no military training, but there is a physical fitness test. The test is usually in October-November, following the standards set by the Ministry of Education for college students.' },
        'faq_fun_01_q': { zh: '学校附近有什么商场或休闲娱乐场所？', en: 'What shopping malls or entertainment venues are near the school?' },
        'faq_fun_01_a': { zh: '离学校最近的商场是大运天地，稍远一点还有龙岗星河COCO Park，COCO Park里有海底捞等各类饭店，有电影院，还有山姆会员超市。同时学校周围还有万科广场、万科里等，基本可满足日常逛街、外出吃饭、看电影等需求。学校附近还有大运自然公园等休闲娱乐场所。', en: 'The nearest shopping mall to the school is Dayun Tiandi. A bit further away is Longgang COCO Park, which has various restaurants including Haidilao, a cinema, and Sam\'s Club. There are also Vanke Plaza and Vanke Li around the school, which basically meet daily needs for shopping, dining out, and watching movies. There are also recreational venues like Dayun Nature Park near the school.' },
        'faq_fun_02_q': { zh: '校乐团非音乐学院学生可以参加吗？要怎样考核呢？', en: 'Can non-Music School students join the school orchestra? How is the audition?' },
        'faq_fun_02_a': { zh: '学校艺术团体分为三大团：校合唱团、管弦乐团和民乐团。全校全体师生都可以通过报名→考核的流程加入艺术团体。合唱团的考核包括：清唱自选歌曲片段 + 现场视唱（可自选五线谱/简谱）+ 音域测试。通过考核的成员会收到邮件通知并告知所在声部（女高/女低/男高/男低）。合唱团每周排练两次，会参加学校年度音乐会演出以及合唱团专场演出。', en: 'The school\'s art groups are divided into three major groups: the School Choir, Orchestra, and Chinese Music Orchestra. All teachers and students of the school can join the art groups through the registration → audition process. The choir audition includes: a cappella singing of a self-selected song excerpt + on-site sight-singing (can choose between staff notation or numbered musical notation) + vocal range test. Members who pass the audition will receive email notification and be informed of their voice section (soprano/alto/tenor/bass). The choir rehearses twice a week and participates in the school\'s annual concert and the choir\'s special performance.' },
        'faq_fun_03_q': { zh: '社团管理层或是学生会干部在日后国外offer申请时有帮助吗？', en: 'Are club leadership or student union roles helpful for future overseas offer applications?' },
        'faq_fun_03_a': { zh: '申请是一件很综合的事，可以说你在学校做的所有事都可能对申请有影响。除了目标学校官网公布的申请条件，没有什么是一定必要或不必要的。经历丰富一点可能会让审核人员看到你的多元化和发展潜力。', en: 'Application is a very comprehensive matter. It can be said that everything you do at school may have an impact on your application. Except for the application requirements published on the target school\'s official website, nothing is absolutely necessary or unnecessary. Having richer experiences may allow reviewers to see your diversity and development potential.' },
        'faq_fun_04_q': { zh: '新生舞会是必须参加吗？', en: 'Is the freshman dance mandatory?' },
        'faq_fun_04_a': { zh: '不是，完全自愿！新生舞会是学校传统的迎新活动之一，可以认识新朋友、体验社交舞，有兴趣的同学可以参加。', en: 'No, completely voluntary! The freshman dance is one of the school\'s traditional welcome activities, where you can meet new friends and experience social dancing. Interested students can participate.' },
        'faq_hint':      { zh: '📝 此处等待添加更多常见问题和详细解答...', en: '📝 More FAQs and detailed answers to be added here...' },


        // ===== websites.html =====
        'web_01_title': { zh: '香港中文大学（深圳）官网', en: 'CUHK (Shenzhen) Official Website'},
        'web_01_desc': { zh: '学校官方网站。在校生可查看各自专业的修读计划，提前做好规划。', en: 'Official university website. Students can check their major\'s study plan for early planning.'},
        'web_01_btn': { zh: '访问官网', en: 'Open Website' },
        'web_02_title': { zh: '教务处官网', en: 'Registry Office Website'},
        'web_02_desc': { zh: '用于选课，主修/选修课的建议以及参考。内网访问。', en: 'For course selection and major/minor advising. Intranet access required.'},
        'web_02_btn': { zh: '访问教务处', en: 'Open Website' },
        'web_03_title': { zh: '学校内网（i.cuhk）', en: 'University Intranet (i.cuhk)'},
        'web_03_desc': { zh: '学生最常用的网站，提供线上打印、教务系统、图书馆系统、Blackboard、迎新注册系统等一站式服务。需内网或 VPN 访问。', en: 'Most used site for students: online printing, academic system, library system, Blackboard, orientation registration — all in one. Requires intranet or VPN.'},
        'web_03_btn': { zh: '访问内网', en: 'Open Website' },
        'web_04_title': { zh: 'SIS 教务系统', en: 'SIS Academic System'},

        'fac_canteen_intro': { zh: '学校现设8家食堂，分别位于学生中心、逸夫书院、思廷书院、永平书院、会议楼Ⅰ以及音乐学院。学生中心一楼食堂设有13个风味档口，为师生提供各色餐食；学生中心二楼食堂为湘赣风味餐厅；逸帆风顺食堂（逸夫书院）为陕西风味食堂；海月廷食堂（思廷书院）为粤式风味餐厅；东南西北风食堂为江浙风味+东南亚风味食堂；会议楼Ⅰ一楼食堂为特色品牌食堂；音乐学院食堂为大众食堂。', en: 'There are 8 canteens on campus, located at the Student Centre, Shaw College, Muse College, Yongping College, Conference Building I, and the Music School. The Student Centre 1/F canteen offers 13 food stalls with diverse cuisines; 2/F serves Hunan & Jiangxi cuisine; Yifan Fengshun (Shaw College) serves Shaanxi cuisine; Haiyueting (Muse College) offers Cantonese cuisine; Dongnan Xibeifeng features Jiang-Zhe and Southeast Asian cuisine; Conference Building I 1/F is a specialty brand canteen; and the Music School canteen provides general dining.' },

 class=\"search-item-text\">' +\n                            '<div class=\"name\">' + highlightedName + '</div>' +\n                            '<div class=\"desc\">' + r.desc + '</div>' +\n                        '</div>' +\n                        '<span class=\"search-item-type\">' + r.label + '</span>' +\n                    '</div>';\n        });\n        searchDropdown.innerHTML = html;\n        searchDropdown.classList.add('show');\n        activeSearchIdx = -1;\n\n        /* 绑定 hover -> active */\n        searchDropdown.querySelectorAll('.search-item').forEach(function(item) {\n            item.addEventListener('mouseenter', function() {\n                searchDropdown.querySelectorAll('.search-item').forEach(function(s) { s.classList.remove('active'); });\n                item.classList.add('active');\n                activeSearchIdx = parseInt(item.dataset.idx);\n            });\n            item.addEventListener('click', function() {\n                selectSearchResult(item.dataset.id);\n            });\n        });\n    }\n\n    /* 选择搜索结果 */\n    function selectSearchResult(id) {\n        searchDropdown.classList.remove('show');\n        searchInput.value = '';\n        activeSearchIdx = -1;\n\n        var card = document.querySelector('.loc-card[data-id=\"' + id + '\"]');\n        if (!card) return;\n\n        /* 确保该分类可见：找到对应筛选按钮并点击 */\n        var type = card.dataset.type;\n        var btn  = document.querySelector('.filter-btn[onclick*=\"' + type + '\"]');\n        if (btn && currentFilter !== type) {\n            window.setFilter(type, btn);\n        } else if (currentFilter !== 'all' && !btn) {\n            /*  fallback：切到全部 */\n            var allBtn = document.querySelector('.filter-btn[onclick*=\"all\"]');\n            if (allBtn) window.setFilter('all', allBtn);\n        }\n\n        /* 滚动到卡片并高亮 */\n        setTimeout(function() {\n            card.scrollIntoView({ behavior: 'smooth', block: 'center' });\n            card.classList.add('locating        items[activeSearchIdx].scrollIntoView({ block: 'nearest' });\n        }\n    }\n\n    /* 点击页面其他地方关闭下拉 */\n    document.addEventListener('click', function(e) {\n        if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {\n            searchDropdown.classList.remove('show');\n        }\n    });\n\n    /* ========== 搜索功能结束 ========== */\n\n    /* ========== 缩放变换 ========== */\n\n    var _lastMarkerScale = -1;\n    function maybeUpdateMarkers(s) {\n        if (Math.abs(s - _lastMarkerScale) < 0.02) return;\n        _lastMarkerScale = s;\n        var inv = 1 / s;\n        allMarkers.forEach(function(m) { m.style.setProperty('--inv', inv); });\n    }\n\n    function applyTransform() {\n        zoomGroup.style.transform =\n            'translate(' + (panX * scale) + 'px,' + (panY * scale) + 'px) ' +\n            'scale(' + scale + ')';\n        var pct = Math.round(scale * 100) + '%';\n        elZoom.textContent = pct;\n        var fsEl = document.getElementById('fsZoomLevel');\n        if (fsEl) fsEl.textContent = pct;\n        maybeUpdateMarkers(scale);\n    }\n\n    function fitToView() {\n        if (!imgW) return;\n        var vW = viewport.clientWidth;\n        var vH = viewport.clientHeight;\n        var s  = Math.min(vW / imgW, vH / imgH);\n        scale  = Math.max(MIN_S, Math.min(MAX_S, s));\n        panX   = (vW - imgW * scale) / (2 * scale);\n        panY   = (vH - imgH * scale) / (2 * scale);\n        applyTransform();\n    }\n    window.fitToView = fitToView;\n\n    function zoomAtCenter(newS) {\n        newS = Math.max(MIN_S, Math.min(MAX_S, newS));\n        var vW = viewport.clientWidth;\n        var vH = viewport.clientHeight;\n        var mapCX = (vW / 2 - panX * scale) / scale;\n        var mapCY = (vH / 2 - panY * scale) / scale;\n        var newPanX = (vW / 2 - mapCX * newS) / newS;\n        var newPanY = (vH / 2 - mapCY * newS) / newS;\n        animateTo(newPanX, newPanY, newS);\n    }\n\n    function animateTo(tpX, tpY, tS) {\n        var s0 = scale, p0x = panX, p0y = panY;\n        var t0 = null, dur = 500;\n        function step(ts) {\n            if (!t0) t0 = ts;\n            var p = Math.min((ts - t0) / dur, 1);\n            var e = 1 - Math.pow(1 - p, 3);\n            scale = s0 + (tS - s0) * e;\n            panX  = p0x + (tpX - p0x) * e;\n            panY  = p0y + (tpY - p0y) * e;\n            applyTransform();\n            if (p < 1) requestAnimationFrame(step);\n        }\n        requestAnimationFrame(step);\n    }\n\n    /* 以指定屏幕坐标为中心缩放（用于双指缩放） */\n    function zoomAtPoint(newS, clientX, clientY) {\n        newS = Math.max(MIN_S, Math.min(MAX_S, newS));\n        var rect = viewport.getBoundingClientRect();\n        var px = clientX - rect.left;\n        var py = clientY - rect.top;\n        var mapX = px / scale - panX;\n        var mapY = py / scale - panY;\n        scale = newS;\n        panX = px / newS - mapX;\n        panY = py / newS - mapY;\n        applyTransform();\n    }\n\n    var iconMap = {\n    'east-gate':'东',\n    'south-new':'新',\n    'south-old':'老',\n    'west-gate':'西',\n    'music-gate':'音',\n    'xiangbo-gate':'祥',\n    'north-gate':'北',\n    'txa':'A',\n    'txb':'B',\n    'txc':'C',\n    'txd':'D',\n    'ta':'A',\n    'tb':'B',\n    'tc':'C',\n    'td':'D',\n    'lixianyi':'李',\n    'tuhui':'涂',\n    'daoyuan':'道',\n    'zhixin':'知',\n    'chengdao':'诚',\n    'zhiren':'志',\n    'letian':'乐',\n    'keyanlou':'科',\n    'music-bldg':'音',\n    'yixue':'医',\n    'sme':'经',\n    'sse':'理',\n    'hss':'人',\n    'sds':'数',\n    'sai':'智',\n    'spp':'政',\n    'shaw':'逸',\n    'eighth':'八',\n    'harmonia':'祥',\n    'ling':'道',\n    'diligentia':'学',\n    'muse':'思',\n    'minerva':'厚',\n    'duan':'永',\n    'library-new':'新',\n    'library-old':'旧',\n    'conference1':'Ⅰ',\n    'conference2':'Ⅱ',\n    'jccic':'会',\n    'admin':'行',\n    'student-cent':'学',\n    'monitor':'监',\n    'parking':'停',\n    'gym':'体',\n    'comprehensive':'综',\n    'track':'田',\n    'basketball':'篮',\n    'tennis':'网',\n    'hair-salon':'剪',\n    'neishan':'书',\n    'citic-bank':'银',\n    'staff-center':'乐',\n    'familymart':'全',\n    'sf-express':'丰',\n    'clinic-lower':'医',\n    'clinic-upper':'医',\n    'typo':'印',\n    'eyeglass':'眼',\n    'property':'物',\n    'tea-shop':'茶',\n    'starbucks':'星',\n    'lawson':'罗',\n    'laundry':'洗',\n    'tianmao':'猫',\n    'q-hair':'Q',\n    'stone-souvenir':'礼',\n    'youranju':'悠',\n    'shanghe':'尚',\n    'yifan':'逸',\n    'wanghu1':'湖',\n    'wanghu2':'湖',\n    'haiyueting':'海',\n    'xiangbo-cant':'香',\n    'sennw':'风',\n    'music-canteen':'音',\n    'xixiang':'星',\n    'canteen2':'骊',\n    'mcdonald':'麦',\n    'pizza':'乐',\n    'tea-res':'太',\n    'fairy-lake':'湖',\n    'clocktower':'钟',\n    'staff-dorm':'宿',\n    'music-hall':'厅',\n    'music-lib':'音',\n    };\n\n    function createMarkers() {\n        document.querySelectorAll('.loc-card[data-x]').forEach(function(card) {\n            var id   = card.dataset.id;\n            var xPct = parseFloat(card.dataset.x);\n            var yPct = parseFloat(card.dataset.y);\n            var type = card.dataset.type;\n            var title = card.querySelector('h5').textContent.trim();\n\n            var m = document.createElement('div');\n            m.className = 'map-marker marker-' + type;\n            m.id = 'marker-' + id;\n            m.style.left = xPct + '%';\n            m.style.top  = yPct + '%';\n            m.innerHTML =\n                '<span style=\"pointer-events:none\">' + (iconMap[id]||'●') + '</span>' +\n                '<div class=\"marker-tooltip\">' + title + '</div>';\n            m.dataset.mid = id;\n\n            m.addEventListener('click', function(e) {\n                e.stopPropagation();\n                /* 点击地图标注也进入单标注模式 */\n                singleMode = true;\n                /* 取消所有筛选按钮的激活状态，提醒用户需重新选择 */\n                document.querySelectorAll('.map-toolbar .filter-btn').forEach(function(b){ b.classList.remove('active'); });\n                singleMId  = id;\n                updateMarkersVisibility();\n\n                var card = document.querySelector('.loc-card[data-id=\"' + id + '\"]');\n                if (card) {\n                    var xPct = parseFloat(card.dataset.x) / 100;\n                    var yPct = parseFloat(card.dataset.y) / 100;\n                    var tx = xPct * imgW, ty = yPct * imgH;\n                    var vW = viewport.clientWidth, vH = viewport.clientHeight;\n                    var newScale = 0.5;\n                    animateTo(vW/(2*newScale)-tx, vH/(2*newScale)-ty, newScale);\n                }\n                activateMarker(id);\n                scrollToCard(id);\n            });\n\n            markersL.appendChild(m);\n            allMarkers.push(m);\n        });\n    }\n\n    function jumpToLocation(cardEl) {\n        var id    = cardEl.dataset.id;\n        var xPct  = parseFloat(cardEl.dataset.x) / 100;\n        var yPct  = parseFloat(cardEl.dataset.y) / 100;\n        var title = cardEl.querySelector('h5').textContent.trim();\n\n        /* 滚动到地图区域 */\n        var mapSection = document.getElementById('mapViewport');\n        if (mapSection) {\n            mapSection.scrollIntoView({ behavior: 'smooth', block: 'start' });\n        }\n\n        /* 进入单标注模式 */\n        singleMode = true;\n        /* 取消所有筛选按钮的激活状态，提醒用户需重新选择 */\n        document.querySelectorAll('.map-toolbar .filter-btn').forEach(function(b){ b.classList.remove('active'); });\n        singleMId  = id;\n        updateMarkersVisibility();\n\n        showJumpIndicator(title);\n\n        var tx = xPct * imgW;\n        var ty = yPct * imgH;\n        var vW = viewport.clientWidth;\n        var vH = viewport.clientHeight;\n        var newScale = 0.5;  \n\n        var targetPanX = vW / (2 * newScale) - tx;\n        var targetPanY = vH / (2 * newScale) - ty;\n\n        animateTo(targetPanX, targetPanY, newScale);\n        activateMarker(id);\n\n        cardEl.classList.add('locating');\n        setTimeout(function(){ cardEl.classList.remove('locating'); }, 800);\n    }\n\n    function activateMarker(id) {\n        if (activeMarkerId && activeMarkerId !== id) {\n            var prev = document.getElementById('marker-' + activeMarkerId);\n            if (prev) prev.classList.remove('active');\n        }\n        activeMarkerId = id;\n        var m = document.getElementById('marker-' + id);\n        if (m) m.classList.add('active');\n    }\n    function deactivateAllMarkers() {\n        document.querySelectorAll('.map-marker.active').forEach(function(m){ m.classList.remove('active'); });\n        activeMarkerId = null;\n    }\n\n    /* 根据当前模式更新所有标注的显示/隐藏 */\n    function updateMarkersVisibility() {\n        allMarkers.forEach(function(m) {\n            var mid = m.dataset.mid;\n            if (singleMode) {\n                m.style.display = (mid === singleMId) ? '' : 'none';\n            } else {\n                var card = document.querySelector('.loc-card[data-id=\"' + mid + '\"]');\n                var show = currentFilter === 'all' || (card && card.dataset.type === currentFilter);\n                m.style.display = show ? '' : 'none';\n            }\n        });\n    }\n    function scrollToCard(id) {\n        var c = document.querySelector('.loc-card[data-id=\"' + id + '\"]');\n        if (c) c.scrollIntoView({ behavior:'smooth', block:'center' });\n    }\n    function showJumpIndicator(name) {\n        var el = document.getElementById('jumpIndicator');\n        el.textContent = '📍 ' + name;\n        el.classList.add('show');\n        clearTimeout(el._t);\n        el._t = setTimeout(function(){ el.classList.remove('show'); }, 2200);\n    }\n\n    document.querySelectorAll('.loc-card[data-x]').forEach(function(c) {\n        c.addEventListener('click', function(){ jumpToLocation(this); });\n    });\n\n    document.getElementById('zoomIn').onclick  =\n        function(){ zoomAtCenter(scale + 0.1); deactivateAllMarkers(); };\n    document.getElementById('zoomOut').onclick =\n        function(){ zoomAtCenter(scale - 0.1); deactivateAllMarkers(); };\n\n    viewport.addEventListener('wheel', function(e) {\n        e.preventDefault();\n        var step = e.deltaY > 0 ? -0.1 : 0.1;\n        zoomAtCenter(scale + step);\n    }, { passive:false });\n\n    var dragStartX, dragStartY, dragStartPanX, dragStartPanY;\n    viewport.addEventListener('mousedown', function(e) {\n        if (e.target.closest('.map-marker')) return;\n        if (e.target.closest('.fs-controls')) return;\n        if (e.target.closest('.fs-close-btn')) return;\n        isDrag = true;\n        dragStartX = e.clientX;\n        dragStartY = e.clientY;\n        dragStartPanX = panX;\n        dragStartPanY = panY;\n        viewport.style.cursor = 'grabbing';\n    });\n    document.addEventListener('mousemove', function(e) {\n        if (!isDrag) return;\n        var dx = e.clientX - dragStartX;\n        var dy = e.clientY - dragStartY;\n        panX = dragStartPanX + dx / scale;\n        panY = dragStartPanY + dy / scale;\n        applyTransform();\n    });\n    document.addEventListener('mouseup', function(){\n        isDrag = false;\n        viewport.style.cursor = 'grab';\n    });\n\n    /* ===== 双指缩放 ===== */\n    var isPinching  = false;\n    var pinchDist0  = 0;\n    var pinchScale0 = 1;\n\n    function getPinchDist(touches) {\n        var dx = touches[0].clientX - touches[1].clientX;\n        var dy = touches[0].clientY - touches[1].clientY;\n        return Math.sqrt(dx * dx + dy * dy);\n    }\n\n    viewport.addEventListener('touchstart', function(e) {\n        if (e.target.closest('.map-marker')) return;\n        if (e.target.closest('.fs-controls')) return;\n        if (e.target.closest('.fs-close-btn')) return;\n        if (e.touches.length === 1) {\n            isDrag = true;\n            isPinching = false;\n            dragStartX = e.touches[0].clientX;\n            dragStartY = e.touches[0].clientY;\n            dragStartPanX = panX;\n function showPage(name) {
    if (__currentPage === name) return;
    __currentPage = name;

    var root = document.getElementById('app-root');
    var tpl = document.getElementById('tpl-' + name);
    if (!tpl) { console.error('Template not found:', name); return; }

    root.innerHTML = '';
    root.appendChild(tpl.content.cloneNode(true));

    // Shim: make DOMContentLoaded fire immediately (DOM is already loaded in SPA)
    var origAddEventListener = document.addEventListener;
    document.addEventListener = function(type, fn, opts) {
        if (type === 'DOMContentLoaded') {
            try { fn.call(document, { type: 'DOMContentLoaded' }); } catch(e) { console.error('DOMContentLoaded error:', e); }
            return;
        }
        origAddEventListener.call(document, type, fn, opts);
    };

    // Run page-specific scripts
    var scripts = pageScripts[name] || [];
    scripts.forEach(function(code) {
        try {
            var el = document.createElement('script');
            el.textContent = code;
            root.appendChild(el);
            root.removeChild(el);
        } catch(e) {
            console.error('Page script error (' + name + '):', e);
        }
    });

    // Restore addEventListener
    document.addEventListener = origAddEventListener;

    // Apply i18n translations
    if (window.i18n && window.i18n.initI18n) {
        window.i18n.initI18n();
    }

    // Scroll to top
    window.scrollTo(0, 0);
}

// Navigate functions (called from HTML onclick)
function navigateTo(page) {
    showPage(page.replace('.html', ''));
}
function goBack() {
    showPage('main');
}
function logout() {
    if (confirm('确定要切换学校吗？')) {
        showPage('login');
    }
}

    nameBox.textContent = name;
    var hint = document.createElement("div");
    hint.style.cssText = "font-size:13px;color:#999;line-height:1.7;margin-bottom:18px;";
    hint.innerHTML = "请复制以上名称，<br>在微信顶部搜索框粘贴并搜索";
    var btn = document.createElement("button");
    btn.style.cssText = "padding:10px 40px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;";
    btn.textContent = "知道了";
    btn.onclick = function() { overlay.remove(); };
    box.appendChild(title);
    box.appendChild(nameBox);
    box.appendChild(hint);
    box.appendChild(btn);
    overlay.appendChild(box);
    overlay.addEventListener("click", function(e) { if(e.target===overlay) overlay.remove(); });
    document.body.appendChild(overlay);
}


// Initialize - show login page
document.addEventListener('DOMContentLoaded', function() {
    showPage('login');
});


</script>
</body>
