<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>校园新生指南 - 登录</title>
    <link href="css/style.css" rel="stylesheet"/>
    <script src="js/i18n.js"></script>
</head>
<body>
<div class="login-container">
<div class="login-box">
<div class="login-header">
<h1 data-i18n="login_h1">校园新生指南</h1>
<p class="subtitle" data-i18n="login_subtitle">快速了解你的校园</p>
</div>
<div class="login-form">
<h2 data-i18n="login_h2">选择你的学校</h2>
<div class="school-select">
<div class="school-option selected" data-school="cuhksz">
<img alt="香港中文大学（深圳）" src="images/schools/cuhksz.png"/>
<div class="school-info">
<h3 data-i18n="login_school_name">香港中文大学（深圳）</h3>
<p data-i18n="login_school_en">The Chinese University of Hong Kong, Shenzhen</p>
</div>
<div class="check-mark">✓</div>
</div>
<!-- 未来可以添加更多学校 -->
<div class="school-option disabled">
<div class="school-info">
<h3 data-i18n="login_coming">更多学校即将开放</h3>
<p data-i18n="login_coming_en">Coming Soon...</p>
</div>
</div>
</div>
<button class="login-btn" data-i18n="login_btn" id="enterBtn">进入校园</button>
</div>
<div class="login-footer">
<p data-i18n="login_footer">© 2026 校园新生指南 | 为新生打造的一站式信息平台</p>
</div>
</div>
</div>
    <button class="btn-lang lang-fixed" id="langSwitchBtn"></button>
    <script src="js/login.js"></script>
</body>
</html>
